<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Киняева Ульяна — Планер</title>
  <style>
    :root {
      --blue:   #00BEF2;
      --pink:   #CD0068;
      --yellow: #FFCC00;
      --green:  #4DB400;
      --dark:   #1a1a2e;
      --light:  #f5f7fa;
      --card:   #ffffff;
      --text:   #2d2d2d;
      --muted:  #888;
      --border: #e8e8e8;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI',Arial,sans-serif;background:var(--light);color:var(--text);min-height:100vh;}

    header{background:var(--dark);padding:0 24px;display:flex;align-items:center;gap:12px;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3);}
    .logo-wrap{display:flex;align-items:center;gap:12px;}
    .school-name{color:#fff;font-size:15px;font-weight:700;line-height:1.2;white-space:nowrap;}
    .school-name .sub{display:block;font-size:11px;font-weight:400;color:rgba(255,255,255,.55);letter-spacing:.3px;}
    .hdr-name{margin-left:auto;color:#fff;font-size:16px;font-weight:700;white-space:nowrap;}
    .hdr-name span{color:var(--blue);}
    @media(max-width:480px){header{padding:0 14px;height:56px;}.school-name{font-size:13px;}.hdr-name{font-size:14px;}}

    .filters{display:flex;gap:8px;padding:16px 20px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .filters::-webkit-scrollbar{display:none;}
    .filter-btn{padding:8px 18px;border-radius:20px;border:2px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:14px;font-weight:500;white-space:nowrap;transition:.2s;}
    .filter-btn.active{background:var(--dark);color:#fff;border-color:var(--dark);}
    .filter-btn.remember.active{background:var(--yellow);color:var(--dark);border-color:var(--yellow);}

    .month-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:12px 20px 0;}
    .month-nav button{background:none;border:none;font-size:22px;cursor:pointer;color:var(--dark);}
    .month-nav span{font-weight:700;font-size:16px;min-width:160px;text-align:center;}

    .main{padding:16px 20px 100px;max-width:700px;margin:0 auto;}

    .day-group{margin-bottom:20px;}
    .day-label{font-weight:700;font-size:15px;color:var(--dark);margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid var(--blue);}

    .task-card{background:var(--card);border-radius:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.07);transition:opacity .2s;cursor:grab;}
    .task-card.dragging{opacity:.4;cursor:grabbing;}
    .task-card.drag-over{border:2px dashed var(--blue);}
    .task-card.done{opacity:.5;}
    .task-card.done .task-name{text-decoration:line-through;}
    .task-top{display:flex;align-items:flex-start;gap:10px;padding:12px 12px 10px;}

    .drag-handle{color:#ccc;font-size:18px;cursor:grab;flex-shrink:0;margin-top:2px;line-height:1;user-select:none;}

    .task-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--blue);cursor:pointer;flex-shrink:0;margin-top:2px;background:none;display:flex;align-items:center;justify-content:center;transition:.2s;}
    .task-card.done .task-check{background:var(--green);border-color:var(--green);}
    .task-check::after{content:'✓';color:#fff;font-size:13px;display:none;}
    .task-card.done .task-check::after{display:block;}

    .task-body{flex:1;min-width:0;}
    .task-name{font-weight:600;font-size:15px;word-break:break-word;}
    .task-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
    .task-meta span{font-size:13px;color:var(--muted);}
    .task-deadline{font-size:12px;color:var(--pink);font-weight:600;margin-top:3px;}

    .task-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;}
    .task-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:3px 5px;border-radius:6px;transition:color .2s;}
    .task-btn:hover{color:var(--dark);}
    .task-btn.del:hover{color:var(--pink);}
    .task-btn.expand{font-size:13px;}
    .task-btn.expand.open{color:var(--blue);}

    .task-extra{display:none;padding:0 12px 12px 44px;border-top:1px dashed var(--border);}
    .task-extra.open{display:block;}
    .task-extra textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit;resize:vertical;min-height:60px;outline:none;color:var(--text);transition:border-color .2s;}
    .task-extra textarea:focus{border-color:var(--blue);}
    .files-section{margin-top:10px;}
    .files-label{font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600;}
    .file-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);}
    .file-item:last-child{border-bottom:none;}
    .file-name{font-size:13px;color:var(--blue);text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .file-name:hover{text-decoration:underline;}
    .file-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 2px;}
    .file-del:hover{color:var(--pink);}
    .file-upload-btn{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:6px 12px;border-radius:8px;border:1.5px dashed var(--border);background:none;cursor:pointer;font-size:13px;color:var(--muted);transition:.2s;}
    .file-upload-btn:hover{border-color:var(--blue);color:var(--blue);}
    .file-input{display:none;}

    .remember-header{font-weight:700;font-size:15px;color:var(--dark);margin-bottom:12px;padding-bottom:4px;border-bottom:2px solid var(--yellow);display:flex;align-items:center;gap:8px;}
    .remember-badge{background:var(--yellow);color:var(--dark);border-radius:12px;padding:2px 9px;font-size:13px;font-weight:700;}
    .remember-card{background:var(--card);border-radius:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:3px solid var(--yellow);}
    .remember-card.done{opacity:.45;}
    .remember-card.done .task-name{text-decoration:line-through;}
    .remember-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--yellow);cursor:pointer;flex-shrink:0;background:none;display:flex;align-items:center;justify-content:center;transition:.2s;}
    .remember-card.done .remember-check{background:var(--green);border-color:var(--green);}
    .remember-check::after{content:'✓';color:#fff;font-size:13px;display:none;}
    .remember-card.done .remember-check::after{display:block;}

    .empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:16px;}

    .schedule-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:12px 20px 0;}
    .schedule-nav button{background:none;border:none;font-size:22px;cursor:pointer;color:var(--dark);}
    .schedule-nav span{font-weight:700;font-size:16px;min-width:180px;text-align:center;}
    .sched-row{display:grid;grid-template-columns:72px 1fr;margin-bottom:6px;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);}
    .sched-time{background:var(--dark);color:#fff;padding:10px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.4;gap:2px;}
    .sched-time .ts{font-size:13px;font-weight:700;}
    .sched-time .te{font-size:11px;color:rgba(255,255,255,.55);}
    .sched-body{background:var(--card);padding:10px 12px;display:flex;align-items:center;gap:10px;min-height:48px;}
    .sched-empty{color:var(--muted);font-size:14px;font-style:italic;}
    .sched-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--blue);cursor:pointer;flex-shrink:0;background:none;display:flex;align-items:center;justify-content:center;transition:.2s;}
    .sched-row.done .sched-check{background:var(--green);border-color:var(--green);}
    .sched-row.done .sched-check::after{content:'✓';color:#fff;font-size:11px;display:block;}
    .sched-check::after{content:'✓';color:#fff;font-size:11px;display:none;}
    .sched-row.done .sched-tname{text-decoration:line-through;color:var(--muted);}
    .sched-tname{font-weight:600;font-size:14px;flex:1;}

    .fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--pink);color:#fff;border:none;font-size:28px;cursor:pointer;z-index:200;box-shadow:0 4px 16px rgba(205,0,104,.4);display:flex;align-items:center;justify-content:center;transition:transform .15s;}
    .fab:active{transform:scale(.92);}
    .fab.remember-mode{background:var(--yellow);color:var(--dark);box-shadow:0 4px 16px rgba(255,204,0,.5);}

    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:flex-end;justify-content:center;}
    .overlay.open{display:flex;}
    .modal{background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
    .modal h2{font-size:18px;margin-bottom:16px;}
    .modal label{display:block;font-size:13px;color:var(--muted);margin-bottom:4px;margin-top:12px;}
    .modal input,.modal textarea{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:15px;font-family:inherit;outline:none;transition:border-color .2s;}
    .modal input:focus,.modal textarea:focus{border-color:var(--blue);}
    .modal-btns{display:flex;gap:10px;margin-top:20px;}
    .btn-save{flex:1;padding:13px;border-radius:12px;border:none;background:var(--pink);color:#fff;font-size:16px;font-weight:600;cursor:pointer;}
    .btn-save.yellow{background:var(--yellow);color:var(--dark);}
    .btn-cancel{padding:13px 20px;border-radius:12px;border:1.5px solid var(--border);background:none;font-size:16px;cursor:pointer;}
  </style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <svg width="42" height="42" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <rect x="1"  y="1"  width="13" height="13" rx="2" fill="#00BEF2"/>
      <rect x="17" y="1"  width="13" height="13" rx="2" fill="#CD0068"/>
      <rect x="34" y="1"  width="13" height="13" rx="2" fill="#4DB400"/>
      <rect x="1"  y="17" width="13" height="13" rx="2" fill="#CD0068"/>
      <rect x="17" y="17" width="13" height="29" rx="2" fill="#00BEF2"/>
      <rect x="34" y="17" width="13" height="13" rx="2" fill="#FFCC00"/>
      <rect x="1"  y="33" width="13" height="13" rx="2" fill="#FFCC00"/>
      <rect x="34" y="33" width="13" height="13" rx="2" fill="#4DB400"/>
    </svg>
    <div class="school-name">Интеллект-плюс<span class="sub">Частная школа</span></div>
  </div>
  <div class="hdr-name">Киняева <span>Ульяна</span></div>
</header>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('today',this)">Сегодня</button>
  <button class="filter-btn" onclick="setFilter('week',this)">Эта неделя</button>
  <button class="filter-btn" onclick="setFilter('month',this)">Этот месяц</button>
  <button class="filter-btn remember" onclick="setFilter('remember',this)">⭐ Не забыть</button>
  <button class="filter-btn" onclick="setFilter('schedule',this)">🕘 Расписание</button>
</div>

<div class="schedule-nav" id="scheduleNav" style="display:none">
  <button onclick="changeSchedDay(-1)">‹</button>
  <span id="schedLabel"></span>
  <button onclick="changeSchedDay(1)">›</button>
</div>

<div class="month-nav" id="monthNav" style="display:none">
  <button onclick="changeMonth(-1)">‹</button>
  <span id="monthLabel"></span>
  <button onclick="changeMonth(1)">›</button>
</div>

<div class="main" id="main"></div>
<button class="fab" id="fab" onclick="openModal()">+</button>

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <h2 id="modalTitle">Новая задача</h2>
    <div id="dateFields">
      <label>Дата *</label>
      <input type="date" id="inpDay"/>
      <label>Время</label>
      <input type="time" id="inpTime"/>
      <label>Место</label>
      <input type="text" id="inpPlace" placeholder="Где?"/>
      <label>Срок выполнения</label>
      <input type="date" id="inpDeadline"/>
    </div>
    <label>Задача *</label>
    <input type="text" id="inpTask" placeholder="Что сделать?"/>
    <label>Комментарий</label>
    <textarea id="inpComment" rows="2" placeholder="Дополнительные заметки..."></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-save" id="btnSave" onclick="saveTask()">Добавить</button>
    </div>
  </div>
</div>

<script>
const API = '/api/tasks';
let allTasks = [];
let filter = 'today';
let viewMonth = new Date();
let scheduleDay = new Date();
let addingRemember = false;
let dragSrcId = null;

const SLOTS = [
  {start:'09:00', end:'9:40'},
  {start:'09:50', end:'10:30'},
  {start:'10:40', end:'11:20'},
  {start:'11:30', end:'12:10'},
  {start:'12:20', end:'13:00'},
  {start:'13:15', end:'13:55'},
  {start:'14:10', end:'14:50'},
  {start:'15:00', end:'15:40'},
  {start:'16:00', end:'17:00'},
  {start:'17:00', end:'18:00'},
];

const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DAYS_FULL = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];

function toYMD(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('monthNav').style.display = f === 'month' ? 'flex' : 'none';
  document.getElementById('scheduleNav').style.display = f === 'schedule' ? 'flex' : 'none';
  document.getElementById('fab').classList.toggle('remember-mode', f === 'remember');
  if (f === 'schedule') updateSchedLabel();
  render();
}

function updateSchedLabel() {
  const d = scheduleDay;
  document.getElementById('schedLabel').textContent =
    `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}, ${DAYS_FULL[d.getDay()]}`;
}

function changeSchedDay(delta) {
  scheduleDay = new Date(scheduleDay.getFullYear(), scheduleDay.getMonth(), scheduleDay.getDate() + delta);
  updateSchedLabel();
  render();
}

function changeMonth(d) {
  viewMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth() + d, 1);
  document.getElementById('monthLabel').textContent = MONTHS[viewMonth.getMonth()] + ' ' + viewMonth.getFullYear();
  render();
}

function getRange() {
  const today = new Date(); today.setHours(0,0,0,0);
  if (filter === 'today') return [toYMD(today), toYMD(today)];
  if (filter === 'week') {
    const mon = new Date(today);
    mon.setDate(today.getDate() - today.getDay() + (today.getDay() === 0 ? -6 : 1));
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    return [toYMD(mon), toYMD(sun)];
  }
  const y = viewMonth.getFullYear(), m = viewMonth.getMonth();
  return [toYMD(new Date(y,m,1)), toYMD(new Date(y,m+1,0))];
}

function fmtDeadline(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return `до ${dt.getDate()} ${MONTHS[dt.getMonth()].toLowerCase()}`;
}

function normTime(t) {
  if (!t) return '';
  const parts = t.split(':');
  return parts[0].padStart(2,'0') + ':' + (parts[1]||'00');
}

function render() {
  const main = document.getElementById('main');

  if (filter === 'schedule') {
    const dayStr = toYMD(scheduleDay);
    const dayTasks = allTasks.filter(t => t.place !== '__remember__' && t.day === dayStr);
    const byTime = {};
    dayTasks.forEach(t => { const k = normTime(t.time); if (!byTime[k]) byTime[k] = []; byTime[k].push(t); });
    main.innerHTML = SLOTS.map(slot => {
      const tasks = byTime[slot.start] || [];
      if (!tasks.length) {
        return `<div class="sched-row">
          <div class="sched-time"><span class="ts">${slot.start}</span><span class="te">${slot.end}</span></div>
          <div class="sched-body"><span class="sched-empty">— свободно —</span></div>
        </div>`;
      }
      return tasks.map(t => `
        <div class="sched-row ${t.done?'done':''}" id="scard-${t.id}">
          <div class="sched-time"><span class="ts">${slot.start}</span><span class="te">${slot.end}</span></div>
          <div class="sched-body">
            <div class="sched-check" onclick="toggleDoneAndRerender(${t.id},${t.done})"></div>
            <span class="sched-tname">${esc(t.task)}${t.place?` <span style="font-weight:400;font-size:12px;color:var(--muted)">📍${esc(t.place)}</span>`:''}</span>
          </div>
        </div>`).join('');
    }).join('');
    return;
  }

  if (filter === 'remember') {
    const items = allTasks.filter(t => t.place === '__remember__');
    if (!items.length) { main.innerHTML = '<div class="empty">Список пуст — нажми + чтобы добавить</div>'; return; }
    const active = items.filter(t => !t.done);
    const done   = items.filter(t => t.done);
    const rc = arr => arr.map(t => `
      <div class="remember-card ${t.done?'done':''}" id="card-${t.id}">
        <div class="task-top">
          <div class="remember-check" onclick="toggleDone(${t.id},${t.done})"></div>
          <div class="task-body"><div class="task-name">${esc(t.task)}</div></div>
          <div class="task-actions">
            <button class="task-btn" onclick="duplicateTask(${t.id})" title="Дублировать">⎘</button>
            <button class="task-btn del" onclick="deleteTask(${t.id})">✕</button>
            <button class="task-btn expand" id="expbtn-${t.id}" onclick="toggleExtra(${t.id})">▾</button>
          </div>
        </div>
        <div class="task-extra" id="extra-${t.id}">
          <textarea placeholder="Комментарий..." onblur="saveComment(${t.id},this.value)">${esc(t.comment||'')}</textarea>
          <div class="files-section" id="files-${t.id}"></div>
          <label class="file-upload-btn">📎 Прикрепить файл<input class="file-input" type="file" id="finp-${t.id}" onchange="handleFile(${t.id},this)"/></label>
        </div>
      </div>`).join('');
    main.innerHTML = `
      <div class="remember-header">⭐ Не забыть <span class="remember-badge">${active.length}</span></div>
      ${rc(active)}
      ${done.length ? `<div style="color:var(--muted);font-size:13px;margin:12px 0 8px">Выполнено</div>${rc(done)}` : ''}`;
    items.forEach(t => loadFiles(t.id));
    return;
  }

  if (filter === 'month') {
    document.getElementById('monthLabel').textContent = MONTHS[viewMonth.getMonth()] + ' ' + viewMonth.getFullYear();
  }

  const [from, to] = getRange();
  const filtered = allTasks.filter(t => t.place !== '__remember__' && t.day >= from && t.day <= to);
  const groups = {};
  filtered.forEach(t => (groups[t.day] = groups[t.day] || []).push(t));
  const days = Object.keys(groups).sort();

  if (!days.length) { main.innerHTML = '<div class="empty">Задач нет</div>'; return; }

  main.innerHTML = days.map(day => {
    const d = new Date(day + 'T00:00:00');
    const label = `${d.getDate()} ${MONTHS[d.getMonth()].toLowerCase()}, ${DAYS_FULL[d.getDay()]}`;
    const cards = groups[day].map(t => `
      <div class="task-card ${t.done?'done':''}" id="card-${t.id}"
           draggable="true"
           ondragstart="dragStart(event,${t.id})"
           ondragover="dragOver(event)"
           ondrop="dragDrop(event,${t.id})"
           ondragend="dragEnd(event)">
        <div class="task-top">
          <span class="drag-handle" title="Перетащить">⠿</span>
          <div class="task-check" onclick="toggleDone(${t.id},${t.done})"></div>
          <div class="task-body">
            <div class="task-name">${esc(t.task)}</div>
            <div class="task-meta">
              ${t.time ? `<span>⏰ ${t.time}</span>` : ''}
              ${t.place ? `<span>📍 ${t.place}</span>` : ''}
            </div>
            ${t.deadline ? `<div class="task-deadline">🗓 ${fmtDeadline(t.deadline)}</div>` : ''}
          </div>
          <div class="task-actions">
            <button class="task-btn" onclick="duplicateTask(${t.id})" title="Дублировать">⎘</button>
            <button class="task-btn del" onclick="deleteTask(${t.id})">✕</button>
            <button class="task-btn expand" id="expbtn-${t.id}" onclick="toggleExtra(${t.id})">▾</button>
          </div>
        </div>
        <div class="task-extra" id="extra-${t.id}">
          <textarea placeholder="Комментарий..." onblur="saveComment(${t.id},this.value)">${esc(t.comment||'')}</textarea>
          <div class="files-section" id="files-${t.id}"></div>
          <label class="file-upload-btn">📎 Прикрепить файл<input class="file-input" type="file" id="finp-${t.id}" onchange="handleFile(${t.id},this)"/></label>
        </div>
      </div>`).join('');
    return `<div class="day-group" id="day-${day}"><div class="day-label">${label}</div>${cards}</div>`;
  }).join('');

  filtered.forEach(t => loadFiles(t.id));
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadTasks() {
  const r = await fetch(API);
  allTasks = await r.json();
  render();
}

async function toggleDone(id, wasDone) {
  await fetch(`${API}/${id}`, {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({done: wasDone?0:1})});
  const t = allTasks.find(x=>x.id===id);
  if (t) t.done = wasDone?0:1;
  render();
}

async function toggleDoneAndRerender(id, wasDone) {
  await toggleDone(id, wasDone);
}

async function deleteTask(id) {
  if (!confirm('Удалить задачу?')) return;
  await fetch(`${API}/${id}`, {method:'DELETE'});
  allTasks = allTasks.filter(x=>x.id!==id);
  render();
}

async function duplicateTask(id) {
  const r = await fetch(`${API}/${id}/duplicate`, {method:'POST'});
  const data = await r.json();
  const src = allTasks.find(x=>x.id===id);
  if (src) {
    const newT = {...src, id: data.id, done: 0};
    const idx = allTasks.findIndex(x=>x.id===id);
    allTasks.splice(idx+1, 0, newT);
  }
  render();
}

function toggleExtra(id) {
  const extra = document.getElementById('extra-'+id);
  const btn   = document.getElementById('expbtn-'+id);
  const open  = extra.classList.toggle('open');
  btn.classList.toggle('open', open);
}

const commentTimers = {};
function saveComment(id, val) {
  clearTimeout(commentTimers[id]);
  commentTimers[id] = setTimeout(async () => {
    await fetch(`${API}/${id}`, {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({comment: val})});
    const t = allTasks.find(x=>x.id===id);
    if (t) t.comment = val;
  }, 600);
}

async function loadFiles(taskId) {
  const container = document.getElementById('files-'+taskId);
  if (!container) return;
  const r = await fetch(`${API}/${taskId}/files`);
  const files = await r.json();
  if (!files.length) { container.innerHTML = ''; return; }
  container.innerHTML = `<div class="files-label">Файлы:</div>` +
    files.map(f => `
      <div class="file-item">
        <a class="file-name" href="/api/files/${f.id}" download="${esc(f.filename)}" title="${esc(f.filename)}">${esc(f.filename)}</a>
        <button class="file-del" onclick="deleteFile(${f.id},${taskId})">✕</button>
      </div>`).join('');
}

async function handleFile(taskId, input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 8 * 1024 * 1024) { alert('Файл слишком большой (максимум 8 МБ)'); input.value=''; return; }
  const reader = new FileReader();
  reader.onload = async e => {
    const b64 = e.target.result.split(',')[1];
    await fetch(`${API}/${taskId}/files`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({filename: file.name, mimetype: file.type, data: b64})
    });
    input.value = '';
    loadFiles(taskId);
  };
  reader.readAsDataURL(file);
}

async function deleteFile(fileId, taskId) {
  await fetch(`/api/files/${fileId}`, {method:'DELETE'});
  loadFiles(taskId);
}

function dragStart(e, id) {
  dragSrcId = id;
  e.dataTransfer.effectAllowed = 'move';
  document.getElementById('card-'+id).classList.add('dragging');
}

function dragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.task-card.drag-over').forEach(el=>el.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}

function dragDrop(e, targetId) {
  e.preventDefault();
  if (dragSrcId === targetId) return;
  e.currentTarget.classList.remove('drag-over');
  const srcIdx = allTasks.findIndex(x=>x.id===dragSrcId);
  const tgtIdx = allTasks.findIndex(x=>x.id===targetId);
  if (srcIdx < 0 || tgtIdx < 0) return;
  const [moved] = allTasks.splice(srcIdx, 1);
  allTasks.splice(tgtIdx, 0, moved);
  const updates = allTasks.map((t,i) => ({id: t.id, sort_order: i}));
  allTasks.forEach((t,i) => t.sort_order = i);
  fetch('/api/reorder', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({order:updates})});
  render();
}

function dragEnd(e) {
  document.querySelectorAll('.task-card.dragging').forEach(el=>el.classList.remove('dragging'));
  document.querySelectorAll('.task-card.drag-over').forEach(el=>el.classList.remove('drag-over'));
  dragSrcId = null;
}

function openModal() {
  addingRemember = filter === 'remember';
  document.getElementById('modalTitle').textContent = addingRemember ? '⭐ Не забыть' : 'Новая задача';
  document.getElementById('dateFields').style.display = addingRemember ? 'none' : 'block';
  document.getElementById('btnSave').className = 'btn-save' + (addingRemember ? ' yellow' : '');
  document.getElementById('inpDay').value = toYMD(new Date());
  document.getElementById('inpTime').value = '';
  document.getElementById('inpPlace').value = '';
  document.getElementById('inpDeadline').value = '';
  document.getElementById('inpTask').value = '';
  document.getElementById('inpComment').value = '';
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('inpTask').focus(), 100);
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('open');
}

async function saveTask() {
  const task = document.getElementById('inpTask').value.trim();
  if (!task) { alert('Напиши задачу'); return; }
  let body;
  if (addingRemember) {
    body = {day: toYMD(new Date()), task, time:'', place:'__remember__', comment: document.getElementById('inpComment').value};
  } else {
    const day = document.getElementById('inpDay').value;
    if (!day) { alert('Выбери дату'); return; }
    body = {
      day, task,
      time:     document.getElementById('inpTime').value,
      place:    document.getElementById('inpPlace').value.trim(),
      deadline: document.getElementById('inpDeadline').value,
      comment:  document.getElementById('inpComment').value,
    };
  }
  const r = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  const data = await r.json();
  allTasks.push({id:data.id, done:0, sort_order: allTasks.length, ...body});
  document.getElementById('overlay').classList.remove('open');
  render();
}

loadTasks();
</script>
